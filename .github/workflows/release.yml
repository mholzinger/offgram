name: release

# Cut a GitHub Release when a version tag is pushed:
#   git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile (syntax check)
        run: python -m py_compile offgram.py

      - name: Import smoke test
        env:
          OFFGRAM_COLLECTION: ${{ runner.temp }}/offgram-archive
        run: |
          mkdir -p "$OFFGRAM_COLLECTION"
          python -c "import offgram; print('import OK')"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            offgram.py
            config.example.py
            dist/*
